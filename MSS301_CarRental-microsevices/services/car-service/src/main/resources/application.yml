spring:
  config:
    import: "optional:configserver:http://localhost:8081"
  application:
    name: car-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:car_db}
    username: ${DB_USER:simpi}
    password: ${DB_PASSWORD:1231}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8081
